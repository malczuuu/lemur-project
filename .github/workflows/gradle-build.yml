name: Gradle Build

on:
  workflow_dispatch:
  push:
    branches:
      - "java"
      - "java-*"
      - "kotlin"
      - "kotlin-*"
    paths:
      - ".github/workflows/gradle-build.yml"
      - "buildSrc/**"
      - "gradle/**"
      - "**/src/**"
      - "**/*.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
  pull_request:
    branches:
      - "java"
      - "java-*"
      - "kotlin"
      - "kotlin-*"

jobs:
  build:
    name: Build (Java 25)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout lemur-project
        uses: actions/checkout@v6
        with:
          path: lemur-project

      - name: Checkout problem4j-spring
        uses: actions/checkout@v6
        with:
          repository: problem4j/problem4j-spring
          path: problem4j-spring

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          path: lemur-project

      - name: Gradle Build
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.configuration-cache=false
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.workers.max=1
        run: cd ./lemur-project/ && ./gradlew build -Pcontainers.enabled=true
